name: Deploy web UI to Firebase Hosting

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Build web UI
        run: npm run web:build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project vgc-team-tests --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
